environment:
  sdk: ^3.0.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.weafrica.flutter_app_badger
        pluginClass: FlutterAppBadgerPlugin
