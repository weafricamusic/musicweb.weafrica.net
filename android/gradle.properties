org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.vfs.watch=true
android.useAndroidX=true

# Limit concurrent Gradle workers to reduce memory pressure.
org.gradle.workers.max=2

# Workaround: avoid Kotlin compile daemon connection issues
# ("Could not connect to Kotlin compile daemon")
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvmargs=-Xmx2048m
